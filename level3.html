<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>
CYBER ESCAPE 2077 - LEVEL 3
</title>

<link rel="stylesheet"
href="style.css">

<style>
.game{

    position:relative;

    width:95%;

    max-width:900px;

    height:500px;

    margin:30px auto;

    border:3px solid cyan;

    overflow:hidden;

    background:
    linear-gradient(
        135deg,
        #000814,
        #001d3d
    );
}

.player{

    position:absolute;

    width:40px;

    height:40px;

    background:
    linear-gradient(
        45deg,
        gold,
        orange
    );

    border-radius:50%;

    left:20px;

    top:220px;

    box-shadow:
        0 0 20px gold;
}

.laser{

    position:absolute;

    width:12px;

    height:140px;

    background:red;

    box-shadow:
        0 0 30px red;

    animation:
        laserMove 2s
        infinite
        alternate;
}

@keyframes laserMove{

    from{
        transform:
        translateY(-80px);
    }

    to{
        transform:
        translateY(120px);
    }
}

.portal{

    position:absolute;

    right:20px;

    top:200px;

    width:80px;

    height:80px;

    border-radius:50%;

    background:
    radial-gradient(
        circle,
        cyan,
        blue
    );

    box-shadow:
        0 0 40px cyan;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:40px;

    animation:
        portal 1s
        infinite
        alternate;
}

@keyframes portal{

    from{
        transform:
        scale(1);
    }

    to{
        transform:
        scale(1.1);
    }
}

.radiation{

    position:absolute;

    width:100px;

    height:100px;

    background:
    rgba(
        0,
        255,
        0,
        .4
    );

    border-radius:50%;

    box-shadow:
        0 0 30px lime;
}

.controls{

    display:none;

    margin-top:20px;
}

.controls button{

    width:70px;

    height:70px;

    margin:5px;

    font-size:25px;
}

@media(max-width:700px){

.controls{
    display:block;
}
}
</style>
</head>

<body>

<div class="stars"></div>

<h1 style="text-align:center">
LEVEL 3
</h1>

<h2 style="text-align:center">
Laser Maze
</h2>

<div class="game"
id="game">

    <div class="player"
    id="player">
    </div>

    <div class="laser"
    style="
    left:180px;">
    </div>

    <div class="laser"
    style="
    left:380px;
    animation-delay:
    1s;">
    </div>

    <div class="laser"
    style="
    left:580px;">
    </div>

    <div class="radiation"
    style="
    left:250px;
    top:350px;">
    </div>

    <div class="radiation"
    style="
    left:500px;
    top:50px;">
    </div>

    <div class="portal"
    id="portal">

    🚪

    </div>

</div>

<div class="controls">

<button onclick="move('up')">
⬆
</button>

<br>

<button onclick="move('left')">
⬅
</button>

<button onclick="move('down')">
⬇
</button>

<button onclick="move('right')">
➡
</button>

</div>

<footer>
Created by
Kaashvi Agarwal
</footer>

<script>
const player=
document
.getElementById(
"player"
);

let x=20;
let y=220;

function draw(){

    player.style.left=
    x+"px";

    player.style.top=
    y+"px";

    checkPortal();
}

function move(dir){

    if(dir==="up")
        y-=20;

    if(dir==="down")
        y+=20;

    if(dir==="left")
        x-=20;

    if(dir==="right")
        x+=20;

    if(x<0)x=0;
    if(y<0)y=0;

    if(x>840)
        x=840;

    if(y>440)
        y=440;

    draw();
}

document
.addEventListener(
"keydown",
e=>{

    if(
    e.key==="ArrowUp"
    )
    move("up");

    if(
    e.key==="ArrowDown"
    )
    move("down");

    if(
    e.key==="ArrowLeft"
    )
    move("left");

    if(
    e.key==="ArrowRight"
    )
    move("right");
});

function checkPortal(){

    if(
    x>760 &&
    y>150 &&
    y<280
    ){

        alert(
        "Portal entered!"
        );

        window.location.href=
        "boss.html";
    }
}

draw();
</script>

</body>
</html>
